<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCG Card Gallery</title>
    <link rel="stylesheet" href="style.css">
    <style>

        .card-gallery {
            display: grid;
            grid-template-columns: repeat(10, 1fr); /* 10 cards per row */
            gap: 10px;
            justify-content: center;
            padding: 10px;
        }

        .card-container {
            width: 120px; /* Adjust width */
            height: 180px; /* Adjust height */
            position: relative;
        }

            .card-container img {
                width: 100%;
                height: 100%;
                object-fit: contain; /* Ensures the full image is visible */
                filter: grayscale(100%);
                transition: filter 0.3s ease-in-out, opacity 0.3s ease-in-out;
            }

            .card-container.unlocked img {
                filter: grayscale(0%);
            }

                .card-container.unlocked img:hover {
                    opacity: 0;
                }}
    </style>
</head>
<body>
    <header>
        <h1>Rillas Collectible Cards</h1>
        <a href="inventory.html"><button id="getCreditsButton" class="button">INVENTORY</button></a>
    </header>

    <section class="card-gallery" id="cardGallery">
        <!-- Cards will be dynamically inserted here by JavaScript -->
    </section>

    <script src="card.js"></script>
    <script>
        const cardData = [
            { name: "Fred", image: "imgs/card1.png", hoverImage: "imgs/card1back.jpg", rarity: "COMMON" },
            { name: "Aron", image: "imgs/card2.png", hoverImage: "imgs/card2back.jpg", rarity: "UNCOMMON" },
            { name: "Claudia", image: "imgs/card3.png", hoverImage: "imgs/card3back.jpg", rarity: "RARE" },
            { name: "Bob", image: "imgs/card4.png", hoverImage: "imgs/card4back.jpg", rarity: "EPIC" },
            { name: "Felix", image: "imgs/card5.png", hoverImage: "imgs/card5back.jpg", rarity: "LEGENDARY" },
            { name: "Cloud", image: "imgs/card6.png", hoverImage: "imgs/card1back.jpg", rarity: "COMMON" }
        ];

        function displayCards() {
            const cardGallery = document.getElementById('cardGallery');
            let inventory = JSON.parse(localStorage.getItem('inventory')) || [];
            let inventoryImages = inventory.map(card => card.image); 

            cardData.forEach(cardInfo => {
                const cardContainer = document.createElement('div');
                cardContainer.classList.add('card-container');

                if (inventoryImages.includes(cardInfo.image)) {
                    cardContainer.classList.add('unlocked');
                }

                
                const frontImage = document.createElement('img');
                frontImage.src = cardInfo.image;
                frontImage.classList.add('front');
                frontImage.alt = cardInfo.name; 

                
                const backImage = document.createElement('img');
                backImage.src = cardInfo.hoverImage;
                backImage.classList.add('back');
                backImage.style.position = "absolute";
                backImage.style.top = "0";
                backImage.style.left = "0";
                backImage.style.opacity = "0"; 
                backImage.style.transition = "opacity 0.3s ease-in-out"; 

                if (inventoryImages.includes(cardInfo.image)) {
                    cardContainer.addEventListener("mouseover", () => {
                        backImage.style.opacity = "1"; 
                    });

                    cardContainer.addEventListener("mouseout", () => {
                        backImage.style.opacity = "0"; 
                    });
                }

                const cardLabel = document.createElement("p");
                cardLabel.textContent = cardInfo.name;
                cardLabel.style.textAlign = "center";
                cardLabel.style.fontWeight = "bold";
                cardLabel.style.marginTop = "5px";

                cardContainer.appendChild(frontImage);
                cardContainer.appendChild(backImage);
                cardContainer.appendChild(cardLabel);
                cardGallery.appendChild(cardContainer);
            });
        }


        document.addEventListener("DOMContentLoaded", displayCards);
    </script>
</body>
</html>
