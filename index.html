<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCG Card Gallery</title>
    <link rel="stylesheet" href="style.css">
    <style>

        body {
            background-color: #121212;
            color: #e0e0e0;
            padding-bottom: 120px;
            .inventory
        }
        {
            text-align: center;
        }

        #welcomeMessage {
            font-size: 24px;
            font-weight: bold;
        }
        .card-gallery {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 10px;
            justify-content: center;
            padding: 10px;
        }

        .card-container {
            width: 120px;
            height: 220px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            position: relative;
        }

        .card-container img {
            width: 100%;
            height: 180px;
            object-fit: contain;
        }

        .card-container.locked img.front {
            content: url('imgs/cardlocked.png');
        }

        .card-label {
            text-align: center;
            font-weight: bold;
            margin-top: 5px;
        }

        .button {
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            margin: 5px;
        }
        .image-wrapper {
            width: 100%;
            height: 180px;
            position: relative;
        }
            .image-wrapper img {
                width: 100%;
                height: 100%;
                object-fit: contain;
                position: absolute;
                top: 0;
                left: 0;
                transition: opacity 0.3s ease-in-out;
            }

        .front {
            z-index: 1;
        }

        .back {
            z-index: 2; 
            opacity: 0;
        }

        .card-container:hover .back {
            opacity: 1;
        }

        .card-label {
            margin-top: 5px;
            font-weight: bold;
            font-size: 14px;
            color: white;
            position: relative;
            z-index: 3;
        }
        
        .login-container {
            text-align: right;
            padding: 10px;
        }

    </style>
</head>
<body>
    <header>
        <a href="index.html"><button class="button">GALLERY</button></a>
        <a href="shop.html"><button class="button">SHOP</button></a>
        <a href="inventory.html"><button class="button">INVENTORY</button></a>
        <div class="login-container">
            <button class="button" id="loginButton">Login with Twitch</button>
            <span id="userInfo"></span>
            <button class="button" id="logoutButton">Log out</button>
        </div>
        <h1>GALLERY</h1>

    </header>
    <div id="welcomeMessage">Loading...</div>
    <section class="card-gallery" id="cardGallery"></section>

    <script src="Card.js"></script>
    <script>

        const clientId = "sh11hwnsgw6eoeen8h17jpc99pn2wc";
        const redirectUri = "https://vanillarilla.github.io/rillatcg/auth.html";
        const user = JSON.parse(localStorage.getItem("twitchUser"));

        if (user) {
            document.getElementById("welcomeMessage").textContent = `Welcome, ${user.display_name}!`;
        } else {
            document.getElementById("welcomeMessage").textContent = "Not logged in";
        }

        document.getElementById("loginButton").addEventListener("click", () => {
            const authUrl = `https://id.twitch.tv/oauth2/authorize?client_id=${clientId}&redirect_uri=${redirectUri}&response_type=token&scope=user:read:email`;
            window.location.href = authUrl;  // This redirects to Twitch for login
        });

        const cardData = [
            { name: "Fred", image: "imgs/card1.png", hoverImage: "imgs/card1back.png", rarity: "COMMON" },
            { name: "Aron", image: "imgs/card2.png", hoverImage: "imgs/card2back.png", rarity: "UNCOMMON" },
            { name: "Claudia", image: "imgs/card3.png", hoverImage: "imgs/card3back.png", rarity: "RARE" },
            { name: "Bob", image: "imgs/card4.png", hoverImage: "imgs/card4back.png", rarity: "EPIC" },
            { name: "Felix", image: "imgs/card5.png", hoverImage: "imgs/card5back.png", rarity: "LEGENDARY" },
            { name: "Cloud", image: "imgs/card6.png", hoverImage: "imgs/card6back.png", rarity: "COMMON" }
        ];

        function getTokenFromUrl() {
            const hash = window.location.hash;
            if (hash.includes("access_token")) {
                const params = new URLSearchParams(hash.substring(1));
                return params.get("access_token");
            }
            return null;
        }

        const token = getTokenFromUrl();
        if (token) {
            fetch("https://api.twitch.tv/helix/users", {
                headers: {
                    "Authorization": `Bearer ${token}`,
                    "Client-Id": clientId
                }
            })
                .then(response => response.json())
                .then(data => {
                    if (data.data.length > 0) {
                        const user = data.data[0];
                        document.getElementById("userInfo").textContent = `Logged in as ${user.display_name}`;
                        document.getElementById("loginStatus").textContent = `Logged in as ${user.display_name}`;
                        localStorage.setItem("twitchUser", JSON.stringify(user));
                    }
                });
        }


        // Log out functionality (clear local storage)
        document.getElementById("logoutButton").addEventListener("click", function () {
            localStorage.removeItem("access_token");
            localStorage.removeItem("twitchUser");
            window.location.href = "https://vanillarilla.github.io/rillatcg/index.html";  // Redirect to the home page
        });

        function displayCards() {
            const cardGallery = document.getElementById('cardGallery');
            const user = JSON.parse(localStorage.getItem('twitchUser'));
            let inventory = JSON.parse(localStorage.getItem('inventory')) || [];
            

            if (!user) {
                document.getElementById('welcomeMessage').textContent = "Please log in!";
                return;
            }
            fetch(`http://localhost:3000/api/inventory/${user.id}`)
                .then(response => response.json())
                .then(inventory => {
                    const inventoryImages = inventory.map(card => card.image);

            cardData.forEach(cardInfo => {
                const cardContainer = document.createElement('div');
                cardContainer.classList.add('card-container');

                const isUnlocked = inventoryImages.includes(cardInfo.image);

                const frontImage = document.createElement('img');
                frontImage.src = isUnlocked ? cardInfo.image : 'imgs/cardlocked.png';
                frontImage.classList.add('front');
                frontImage.alt = isUnlocked ? cardInfo.name : "???";

                if (!isUnlocked) {
                    cardContainer.classList.add('locked');
                }

                const backImage = document.createElement('img');
                backImage.src = cardInfo.hoverImage;
                backImage.classList.add('back');
                backImage.style.position = "absolute";
                backImage.style.top = "0";
                backImage.style.left = "0";
                backImage.style.opacity = "0";
                backImage.style.transition = "opacity 0.3s ease-in-out";

                if (isUnlocked) {
                    cardContainer.addEventListener("mouseover", () => {
                        backImage.style.opacity = "1";
                    });
                    cardContainer.addEventListener("mouseout", () => {
                        backImage.style.opacity = "0";
                    });
                }

                const cardLabel = document.createElement("p");
                cardLabel.textContent = isUnlocked ? cardInfo.name : "???";
                cardLabel.classList.add('card-label');

                cardContainer.appendChild(frontImage);
                if (isUnlocked) {
                    cardContainer.appendChild(backImage);
                }
                cardContainer.appendChild(cardLabel);
                cardGallery.appendChild(cardContainer);
            });
                })
                .catch(error => {
                    console.error('Error fetching inventory:', error);
                    document.getElementById('welcomeMessage').textContent = "Failed to load inventory!";
                });

        document.addEventListener("DOMContentLoaded", displayCards);
    </script>
</body>
</html>
