<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCG Card Gallery</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            padding-bottom: 120px;
        }

        #welcomeMessage {
            font-size: 24px;
            font-weight: bold;
        }

        .card-gallery {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 10px;
            justify-content: center;
            padding: 10px;
        }

        .card-container {
            width: 120px;
            height: 220px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            position: relative;
        }

            .card-container img {
                width: 100%;
                height: 180px;
                object-fit: contain;
            }

            .card-container.locked img.front {
                content: url('imgs/cardlocked.png');
            }

        .card-label {
            text-align: center;
            font-weight: bold;
            margin-top: 5px;
        }

        .button {
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            margin: 5px;
        }

        .image-wrapper {
            width: 100%;
            height: 180px;
            position: relative;
        }

            .image-wrapper img {
                width: 100%;
                height: 100%;
                object-fit: contain;
                position: absolute;
                top: 0;
                left: 0;
                transition: opacity 0.3s ease-in-out;
            }

        .front {
            z-index: 1;
        }

        .back {
            z-index: 2;
            opacity: 0;
        }

        .card-container:hover .back {
            opacity: 1;
        }

        .card-label {
            margin-top: 5px;
            font-weight: bold;
            font-size: 14px;
            color: white;
            position: relative;
            z-index: 3;
        }

        .login-container {
            text-align: right;
            padding: 10px;
        }

        .button {
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            margin: 5px;
        }


    </style>
</head>
<body>
    <header>
        <a href="index.html"><button class="button">GALLERY</button></a>
        <a href="shop.html"><button class="button">SHOP</button></a>
        <a href="inventory.html"><button class="button">INVENTORY</button></a>
        <button id="twitch-login" class="button" style="background-color: purple; color: white;">Login with Twitch</button>
        <button id="logout-button" class="button" style="background-color: #444; color: white;">Logout</button>

        <h1>GALLERY</h1>

    </header>

    <section class="card-gallery" id="cardGallery"></section>

    <script src="Card.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const loginBtn = document.getElementById("twitch-login");
            const logoutBtn = document.getElementById("logout-button");

            const urlParams = new URLSearchParams(window.location.search);
            const userDataEncoded = urlParams.get('user');

            if (userDataEncoded) {
                try {
                    const userData = JSON.parse(decodeURIComponent(userDataEncoded));
                    localStorage.setItem('twitchUser', JSON.stringify(userData));
                    console.log("Twitch user saved to localStorage:", userData);

                    // Immediately update UI without refresh
                    loginBtn.style.display = "none";
                    logoutBtn.style.display = "inline-block";

                    // Clean the URL so the user param disappears
                    window.history.replaceState({}, document.title, window.location.pathname);
                } catch (e) {
                    console.error("Failed to parse user data:", e);
                }
            }
        });
    </script>
    <script>

        const cardData = [
            { name: "Fred", image: "imgs/card1.png", hoverImage: "imgs/card1back.png", rarity: "COMMON" },
            { name: "Aron", image: "imgs/card2.png", hoverImage: "imgs/card2back.png", rarity: "UNCOMMON" },
            { name: "Claudia", image: "imgs/card3.png", hoverImage: "imgs/card3back.png", rarity: "RARE" },
            { name: "Bob", image: "imgs/card4.png", hoverImage: "imgs/card4back.png", rarity: "EPIC" },
            { name: "Felix", image: "imgs/card5.png", hoverImage: "imgs/card5back.png", rarity: "LEGENDARY" },
            { name: "Cloud", image: "imgs/card6.png", hoverImage: "imgs/card6back.png", rarity: "COMMON" }
        ];

        function displayCards() {
            const cardGallery = document.getElementById('cardGallery');
            let inventory = JSON.parse(localStorage.getItem('inventory')) || [];
            let inventoryImages = inventory.map(card => card.image);

            cardData.forEach(cardInfo => {
                const cardContainer = document.createElement('div');
                cardContainer.classList.add('card-container');

                const isUnlocked = inventoryImages.includes(cardInfo.image);

                const frontImage = document.createElement('img');
                frontImage.src = isUnlocked ? cardInfo.image : 'imgs/cardlocked.png';
                frontImage.classList.add('front');
                frontImage.alt = isUnlocked ? cardInfo.name : "???";

                if (!isUnlocked) {
                    cardContainer.classList.add('locked');
                }

                const backImage = document.createElement('img');
                backImage.src = cardInfo.hoverImage;
                backImage.classList.add('back');
                backImage.style.position = "absolute";
                backImage.style.top = "0";
                backImage.style.left = "0";
                backImage.style.opacity = "0";
                backImage.style.transition = "opacity 0.3s ease-in-out";

                if (isUnlocked) {
                    cardContainer.addEventListener("mouseover", () => {
                        backImage.style.opacity = "1";
                    });
                    cardContainer.addEventListener("mouseout", () => {
                        backImage.style.opacity = "0";
                    });
                }

                const cardLabel = document.createElement("p");
                cardLabel.textContent = isUnlocked ? cardInfo.name : "???";
                cardLabel.classList.add('card-label');

                cardContainer.appendChild(frontImage);
                if (isUnlocked) {
                    cardContainer.appendChild(backImage);
                }
                cardContainer.appendChild(cardLabel);
                cardGallery.appendChild(cardContainer);
            });
        }

        document.addEventListener("DOMContentLoaded", displayCards);
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js"></script>

    <!-- Firestore (or use firebase-database if using Realtime DB) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        // Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyAW75d_4o7XdCsJ1_LmM_h4b2MxSJzrxfU",
            authDomain: "rillatcg-ab6ba.firebaseapp.com",
            projectId: "rillatcg-ab6ba",
            storageBucket: "rillatcg-ab6ba.appspot.com",
            messagingSenderId: "36231086933",
            appId: "1:36231086933:web:28450b8b754eff95f7a5dc"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadUserData() {
            const userData = JSON.parse(localStorage.getItem('twitchUser'));
            if (userData) {
                try {
                    const userRef = doc(db, "users", userData.id);
                    const userDoc = await getDoc(userRef);
                    if (userDoc.exists()) {
                        const user = userDoc.data();

                        // Load user data (balance and inventory)
                        localStorage.setItem('balance', user.balance);
                        localStorage.setItem('inventory', JSON.stringify(user.inventory));
                        document.getElementById('balance').textContent = `Balance: ${user.balance}`;

                        // Call function to display the updated inventory
                        displayCards();
                    } else {
                        console.log("User document not found in Firestore.");
                    }
                } catch (error) {
                    console.error("Error loading user data: ", error);
                }
            } else {
                console.log("No user data found in localStorage.");
            }
        }

        function logOut() {
            // Clear user data from localStorage
            localStorage.removeItem('twitchUser');
            localStorage.removeItem('balance');
            document.getElementById('balance').textContent = "0"; // Reset balance

            // Optionally, update Firebase (e.g., track logout status)
            const userData = JSON.parse(localStorage.getItem('twitchUser'));
            if (userData) {
                const userRef = doc(db, "users", userData.id);
                updateDoc(userRef, {
                    loggedIn: false
                }).then(() => {
                    console.log("User logged out in Firestore.");
                }).catch((error) => {
                    console.error("Error updating user logout state in Firestore: ", error);
                });
            }

            // Hide the logout button and show login button
            document.getElementById('logoutButton').style.display = 'none';
            document.getElementById('loginButton').style.display = 'block';

            // Redirect to login page or home page if needed
            window.location.href = "login.html"; // Adjust as necessary
        }

        // Get Twitch user from localStorage
        const userData = JSON.parse(localStorage.getItem('twitchUser'));

        // Check if user is logged in
        if (userData) {
            const userRef = doc(db, "users", userData.id);

            // Check if the user document exists
            const docSnap = await getDoc(userRef);

            if (!docSnap.exists()) {
                // User doesn't exist, create a new document with inventory and balance
                const newUser = {
                    id: userData.id,
                    displayName: userData.display_name,
                    profileImage: userData.profile_image_url,
                    inventory: [], // Empty inventory initially
                    balance: 300, // Initial balance
                    createdAt: serverTimestamp(),
                };

                // Save to Firestore
                await setDoc(userRef, newUser);
                console.log("New user created and data saved to Firestore!");
            } else {
                console.log("User data already exists in Firestore.");
            }
        }
    </script>
    <script>
        const loginBtn = document.getElementById("twitch-login");
        const logoutBtn = document.getElementById("logout-button");

        // Check if user is logged in
        const twitchUser = JSON.parse(localStorage.getItem("twitchUser"));

        if (twitchUser) {
            loginBtn.style.display = "none";
            logoutBtn.style.display = "inline-block";
        } else {
            loginBtn.style.display = "inline-block";
            logoutBtn.style.display = "none";
        }

        // Login button click -> Redirect to Twitch OAuth
        loginBtn.addEventListener("click", () => {
            window.location.href = "https://elk-hardy-previously.ngrok-free.app/auth/twitch";
        });


        // Logout button click -> Clear localStorage + destroy session
        logoutBtn.addEventListener("click", async () => {
            localStorage.removeItem("twitchUser");
            await fetch("/logout", { method: "GET", credentials: "include" });
            window.location.href = "index.html";
        });
    </script>
</body>
</html>
