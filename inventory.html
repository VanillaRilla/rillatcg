<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: #121212; /* Dark background */
            color: #e0e0e0; /* Light text color */
            padding-bottom: 120px;
            .inventory {
            text-align: center;
        }

        #searchBox {
            display: block;
            margin: 10px auto;
            padding: 8px;
            width: 50%;
            max-width: 300px;
            border: 1px solid #ccc;
            border-radius: 5px;
            text-align: center;
        }

        #couponSection {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            background-color: #f0f0f0;
            border-radius: 10px;
            box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
            padding: 15px;
            width: 80%;
            max-width: 400px;
        }

        #couponCode {
            width: 90%;
            max-width: 300px;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
            margin-bottom: 10px;
            text-align: center;
        }

        #redeemCoupon {
            width: 100%;
            max-width: 150px;
            padding: 8px;
            font-size: 14px;
        }

        .inventory ul {
            display: flex;
            flex-wrap: wrap;
            list-style-type: none;
            padding: 0;
            margin: 0;
            justify-content: center;
        }

        .inventory li {
            margin: 15px;
            width: 120px;
            height: 180px;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: visible;
            background: transparent;
            border: none;
        }

        .inventory img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: transparent;
        }

        .button {
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            margin: 5px;
        }

        #clearInventoryButton {
            background-color: red;
            color: white;
        }

        #getCreditsButton {
            background-color: green;
            color: white;
        }

        .card-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 300px;
            height: 450px;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
            box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
            opacity: 0;
            transition: transform 0.5s ease, opacity 0.5s ease;
            z-index: 1000;
        }

            .card-popup img {
                width: 100%;
                height: auto;
            }

        .show-popup {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html"><button class="button">GALLERY</button></a>
        <a href="shop.html"><button class="button">SHOP</button></a>
        <a href="inventory.html"><button class="button">INVENTORY</button></a>
        <h1>Inventory</h1>
    </header>

    <div id="cardPopup" class="card-popup">
        <img id="popupImage" src="" alt="New Card">
    </div>

    <section class="inventory">
        <h2>Your Cards</h2>
        <input type="text" id="searchBox" placeholder="Search cards..." oninput="searchInventory()">
        <ul id="inventoryList"></ul>
        <button id="clearInventoryButton" class="button" onclick="clearInventory()">Clear Inventory</button>
    </section>


    </section>

    <script>
        const inventoryList = document.getElementById('inventoryList');
        const getCreditsButton = document.getElementById('getCreditsButton');
        const clearInventoryButton = document.getElementById('clearInventoryButton');
        let inventory = JSON.parse(localStorage.getItem('inventory')) || [];


        



        const cardData = [
            { image: "imgs/card1.png", name: "Fred", rarity: "common", probability: 0.60 },
            { image: "imgs/card2.png", name: "Aron", rarity: "uncommon", probability: 0.25 },
            { image: "imgs/card3.png", name: "Claudia", rarity: "rare", probability: 0.10 },
            { image: "imgs/card4.png", name: "Bob", rarity: "epic", probability: 0.04 },
            { image: "imgs/card5.png", name: "Felix", rarity: "legendary", probability: 0.01 },
            { image: "imgs/card6.png", name: "Cloud", rarity: "common", probability: 0.60 }
        ];

        const rarityOrder = ["legendary", "epic", "rare", "uncommon", "common"];

        function clearInventory() {
            localStorage.removeItem('inventory');  // Deletes stored inventory
            alert("Inventory cleared!");          // Confirmation message
            location.reload();                     // Refresh page to update
        }

        function displayInventory() {
            inventoryList.innerHTML = '';

            inventory.sort((a, b) => rarityOrder.indexOf(b.rarity) - rarityOrder.indexOf(a.rarity));

            inventory.forEach(card => {
                const listItem = document.createElement('li');
                listItem.style.display = "flex";
                listItem.style.flexDirection = "column";
                listItem.style.alignItems = "center";
                listItem.innerHTML = `
            <img src="${card.image}" alt="${card.name}" class="card-image">
            <div style="text-align: center; margin-top: 5px;">
                <p style="font-weight: bold; margin: 0;">${card.name}</p>
                <p style="font-size: 20px; margin: 0;">x${card.count}</p>
            </div>
        `;
                inventoryList.appendChild(listItem);
            });
        }

        function searchInventory() {
            const searchInput = document.getElementById("searchBox").value.toLowerCase();
            const inventoryItems = document.querySelectorAll("#inventoryList li");

            inventoryItems.forEach(item => {
                const img = item.querySelector("img");
                const cardName = img ? img.alt.toLowerCase() : "";

                if (searchInput === "") {
                    item.style.display = "";
                } else if (cardName.includes(searchInput)) {
                    item.style.display = "";
                } else {
                    item.style.display = "none";
                }
            });
        }
        displayInventory();
    </script>

</body>
</html>
