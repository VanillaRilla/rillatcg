<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: #121212; 
            color: #e0e0e0; 
            padding-bottom: 120px;
            .inventory 
            text-align: center;
        }

        #searchBox {
            display: block;
            margin: 10px auto;
            padding: 8px;
            width: 50%;
            max-width: 300px;
            border: 1px solid #ccc;
            border-radius: 5px;
            text-align: center;
        }

        .inventory ul {
            display: flex;
            flex-wrap: wrap;
            list-style-type: none;
            padding: 0;
            margin: 0;
            justify-content: center;
        }

        .inventory li {
            margin: 15px;
            width: 120px;
            height: 180px;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: visible;
            background: transparent;
            border: none;
        }

        .inventory img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: transparent;
        }

        .button {
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            margin: 5px;
        }

        #clearInventoryButton {
            background-color: red;
            color: white;
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html"><button class="button">GALLERY</button></a>
        <a href="shop.html"><button class="button">SHOP</button></a>
        <a href="inventory.html"><button class="button">INVENTORY</button></a>
        <h1>Inventory</h1>
    </header>

    <section class="inventory">
        <h2>Your Cards</h2>
        <input type="text" id="searchBox" placeholder="Search cards..." oninput="searchInventory()">
        <ul id="inventoryList"></ul>
        <button id="clearInventoryButton" class="button" onclick="clearInventory()">Clear Inventory</button>
    </section>


    </section>

    <script>

        const inventoryList = document.getElementById('inventoryList');
        const getCreditsButton = document.getElementById('getCreditsButton');
        const clearInventoryButton = document.getElementById('clearInventoryButton');
        
        let inventory = JSON.parse(localStorage.getItem('inventory')) || [];


        function fetchInventory() {
            // Get the user ID from localStorage (or other authentication method)
            const user = JSON.parse(localStorage.getItem('twitchUser'));
            if (!user) {
                alert("You need to be logged in to view your inventory.");
                return;
            }

            // Fetch the user's inventory from the server
            fetch(`http://localhost:3000/api/inventory/${user.id}`)
                .then(response => response.json())
                .then(inventory => {
                    displayInventory(inventory);
                })
                .catch(error => {
                    console.error('Error fetching inventory:', error);
                    alert("Failed to load inventory.");
                });
        }



        const cardData = [
            { image: "imgs/card1.png", name: "Fred", rarity: "common", probability: 0.60 },
            { image: "imgs/card2.png", name: "Aron", rarity: "uncommon", probability: 0.25 },
            { image: "imgs/card3.png", name: "Claudia", rarity: "rare", probability: 0.10 },
            { image: "imgs/card4.png", name: "Bob", rarity: "epic", probability: 0.04 },
            { image: "imgs/card5.png", name: "Felix", rarity: "legendary", probability: 0.01 },
            { image: "imgs/card6.png", name: "Cloud", rarity: "common", probability: 0.60 }
        ];

        const rarityOrder = ["legendary", "epic", "rare", "uncommon", "common"];

        function clearInventory() {
            localStorage.removeItem('inventory');  
            alert("Inventory cleared!");          
            location.reload();                     
        }

        function displayInventory(inventory) {
            inventoryList.innerHTML = '';

            const rarityColors = {
                common: "gray",
                uncommon: "green",
                rare: "DeepSkyBlue",
                epic: "purple",
                legendary: "gold"
            };

            inventory.sort((a, b) => rarityOrder.indexOf(b.rarity) - rarityOrder.indexOf(a.rarity));

            inventory.forEach(card => {
                const listItem = document.createElement('li');
                listItem.style.display = "flex";
                listItem.dataset.name = card.name.toLowerCase();
                listItem.style.flexDirection = "column";
                listItem.style.alignItems = "center";
                const rarityColor = rarityColors[card.rarity] || "white";
                listItem.innerHTML = `
                    <img src="${card.image}" alt="${card.name}" class="card-image">
                    <div style="text-align: center; margin-top: 5px;">
                        <p class="rarity" style="font-size: 14px; color: ${rarityColor}; margin: 0;">${card.rarity}</p> 
                        <p style="font-weight: bold; margin: 0;">${card.name}</p>
                        <p style="font-size: 20px; margin: 0;">x${card.count}</p>
                    </div>
                `;
                inventoryList.appendChild(listItem);
            });
        }

        function clearInventory() {
            fetch('http://localhost:3000/api/clear-inventory', {
                method: 'POST',
                body: JSON.stringify({ userId: JSON.parse(localStorage.getItem('twitchUser')).id }),
                headers: { 'Content-Type': 'application/json' }
            })
                .then(response => response.json())
                .then(() => {
                    alert("Inventory cleared!");
                    fetchInventory(); // Reload inventory after clearing
                })
                .catch(error => {
                    console.error('Error clearing inventory:', error);
                    alert("Failed to clear inventory.");
                });
        }

        // Load inventory when the page is ready
        fetchInventory();
        displayInventory();
    </script>

</body>
</html>
