<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHOP</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: #121212; /* Dark background */
            color: #e0e0e0; /* Light text color */
            padding-bottom: 120px;
            .inventory text-align: center;
        }

        #couponSection {
            display: none;
            flex-direction: column;
            align-items: center;
            position: fixed;
            bottom: 80px;
            right: 20px;
            background-color: #f0f0f0;
            border-radius: 10px;
            box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
            padding: 10px;
            width: 250px;
            text-align: center;
            opacity: 0;
            transform: scale(0.8);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

            #couponSection.show {
                display: flex;
                opacity: 1;
                transform: scale(1);
            }

        #couponCode {
            width: 80%;
            padding: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
            margin-bottom: 10px;
            text-align: center;
        }

        #redeemCoupon {
            width: 100%;
            padding: 8px;
            font-size: 14px;
            background-color: green;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        #redeemButton {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #28a745;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
        }

        .button {
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            margin: 5px;
        }

        #getCreditsButton {
            background-color: green;
            color: white;
        }

        .card-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 360px;
            height: 450px;
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: transform 0.2s ease, opacity 0.2s ease;
            z-index: 1000;
        }

        .card-popup img {
            width: 100%;
            height: auto;
        }

        .card-popup.fade-left {
            animation: fadeLeft 0.5s forwards;
        }

        @keyframes fadeLeft {
            to {
                transform: translate(-100%, -50%) scale(0);
                opacity: 0;
            }
        }

        .show-popup {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }

        .card-stack-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 360px;
            height: 450px;
            z-index: 1000;
            display: none;
            pointer-events: none; /* enables pointer-events only when cards are shown */
        }

        .card-stack-popup img {
            position: absolute;
            width: 100%;
            height: auto;
            top: 0;
            left: 0;
            border-radius: 10px;
            transition: transform 0.4s ease, opacity 0.3s ease;
            cursor: pointer;
            pointer-events: auto;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }
        
        .card-stack-popup img.fade-out {
            transform: translateX(150%) rotate(15deg);
            opacity: 0;
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html"><button class="button">GALLERY</button></a>
        <a href="shop.html"><button class="button">SHOP</button></a>
        <a href="inventory.html"><button class="button">INVENTORY</button></a>
        <button id="twitch-login" class="button" style="background-color: purple; color: white;">Login with Twitch</button>
        <button id="logout-button" class="button" style="background-color: #444; color: white;">Logout</button>
        <h1>SHOP</h1>
        <p>Balance: <span id="balance">0</span> points</p>
        <button id="addCardButton" class="button">Buy a random card (100 points)</button>
        <button id="buyTenCardsButton" class="button">Buy 10 Cards (1000 points)</button>
        <button id="getCreditsButton" class="button">Get 100 Credits</button>
    </header>

    <div id="cardStackContainer" class="card-stack-popup"></div>
    <button id="redeemButton">HAVE A CODE?</button>
    <section id="couponSection">
        <p style="color: black; font-weight: bold;font-size: 24px;">Redeem a CODE:</p>
        <input type="text" id="couponCode" placeholder="Enter code here">
        <button id="redeemCoupon">REDEEM</button>
        <p id="couponMessage"></p>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, serverTimestamp, updateDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        // Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyAW75d_4o7XdCsJ1_LmM_h4b2MxSJzrxfU",
            authDomain: "rillatcg-ab6ba.firebaseapp.com",
            projectId: "rillatcg-ab6ba",
            storageBucket: "rillatcg-ab6ba.appspot.com",
            messagingSenderId: "36231086933",
            appId: "1:36231086933:web:28450b8b754eff95f7a5dc"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig); // Initialize Firebase App
        const db = getFirestore(app);  // Initialize Firestore with the Firebase app

        const addCardButton = document.getElementById('addCardButton');
        const getCreditsButton = document.getElementById('getCreditsButton');
        const balanceDisplay = document.getElementById('balance');

        let balance = parseInt(localStorage.getItem('balance')) || 0;
        let isBuying = false;

        const coupons = {
            "FREE100": 100,
            "BONUS50": 50,
            "LUCKY2000": 2000
        };

        document.getElementById('redeemButton').addEventListener('click', function () {
            const couponSection = document.getElementById('couponSection');
            if (couponSection.classList.contains('show')) {
                couponSection.classList.remove('show');
                setTimeout(() => {
                    couponSection.style.display = 'none';
                }, 300);
            } else {
                couponSection.style.display = 'flex';
                setTimeout(() => {
                    couponSection.classList.add('show');
                }, 10);
            }
        });

        let redeemedCoupons = JSON.parse(localStorage.getItem('redeemedCoupons')) || [];

        document.getElementById('redeemCoupon').addEventListener('click', () => {
            const code = document.getElementById('couponCode').value.trim().toUpperCase();
            const message = document.getElementById('couponMessage');

            if (redeemedCoupons.includes(code)) {
                message.textContent = "This coupon has already been used.";
                message.style.color = "red";
            } else if (coupons[code]) {
                balance += coupons[code];
                localStorage.setItem('balance', balance);
                document.getElementById('balance').textContent = balance;
                redeemedCoupons.push(code);
                localStorage.setItem('redeemedCoupons', JSON.stringify(redeemedCoupons));
                message.textContent = "Coupon redeemed successfully!";
                message.style.color = "green";
            } else {
                message.textContent = "Invalid coupon code.";
                message.style.color = "red";
            }
        });

        balanceDisplay.textContent = balance;

        const cardData = [
            { image: "imgs/card1.png", name: "Fred", rarity: "common", probability: 0.60 },
            { image: "imgs/card2.png", name: "Aron", rarity: "uncommon", probability: 0.25 },
            { image: "imgs/card3.png", name: "Claudia", rarity: "rare", probability: 0.10 },
            { image: "imgs/card4.png", name: "Bob", rarity: "epic", probability: 0.04 },
            { image: "imgs/card5.png", name: "Felix", rarity: "legendary", probability: 0.01 },
            { image: "imgs/card6.png", name: "Cloud", rarity: "common", probability: 0.60 }
        ];

        function getRandomCard() {
            const rarityProbabilities = [
                { rarity: "legendary", probability: 0.01 },
                { rarity: "epic", probability: 0.04 },
                { rarity: "rare", probability: 0.10 },
                { rarity: "uncommon", probability: 0.25 },
                { rarity: "common", probability: 0.60 }
            ];

            const randomValue = Math.random();
            let cumulativeProbability = 0;
            let selectedRarity = "common";

            for (let rarityObj of rarityProbabilities) {
                cumulativeProbability += rarityObj.probability;
                if (randomValue <= cumulativeProbability) {
                    selectedRarity = rarityObj.rarity;
                    break;
                }
            }

            const filteredCards = cardData.filter(card => card.rarity === selectedRarity);
            return filteredCards.length > 0
                ? filteredCards[Math.floor(Math.random() * filteredCards.length)]
                : cardData[Math.floor(Math.random() * cardData.length)];
        }

        async function updateFirebaseInventory(newBalance, newInventory) {
            const userData = JSON.parse(localStorage.getItem('twitchUser'));
            if (userData) {
                const userRef = doc(db, "users", userData.id);
                await updateDoc(userRef, {
                    balance: newBalance,
                    inventory: newInventory
                });
            }
        }

        async function addRandomCardToInventory() {
            if (balance >= 100 && !isBuying) {
                isBuying = true;
                addCardButton.disabled = true;

                setTimeout(async () => {
                    let inventory = JSON.parse(localStorage.getItem('inventory')) || [];
                    const randomCard = getRandomCard();
                    let existingCard = inventory.find(card => card.image === randomCard.image);
                    if (existingCard) {
                        existingCard.count += 1;
                    } else {
                        inventory.push({ ...randomCard, count: 1 });
                    }
                    localStorage.setItem('inventory', JSON.stringify(inventory));
                    updateBalance(balance - 100);
                    await updateFirebaseInventory(balance, inventory);
                    showCardPopup(randomCard.image);
                    setTimeout(() => {
                        addCardButton.disabled = balance < 100;
                        isBuying = false;
                    }, 3000);
                }, 500);
            } else {
                alert("You are already buying a card! Wait till the animation is done!");
            }
        }

        async function buyTenCards() {
            if (balance >= 1000 && !isBuying) {
                isBuying = true;
                buyTenCardsButton.disabled = true;

                updateBalance(balance - 1000);
                let inventory = JSON.parse(localStorage.getItem("inventory")) || [];
                let drawnCards = [];

                // Draw 10 cards
                for (let i = 0; i < 10; i++) {
                    const randomCard = getRandomCard();
                    let existingCard = inventory.find(card => card.image === randomCard.image);
                    if (existingCard) {
                        existingCard.count += 1;
                    } else {
                        inventory.push({ ...randomCard, count: 1 });
                    }
                    drawnCards.push(randomCard);
                }

                // Sort drawn cards with rarest last
                drawnCards.sort((a, b) => {
                    const rarityOrder = { "common": 0, "uncommon": 1, "rare": 2, "epic": 3, "legendary": 4 };
                    return rarityOrder[a.rarity.toLowerCase()] - rarityOrder[b.rarity.toLowerCase()];
                });

                localStorage.setItem("inventory", JSON.stringify(inventory));
                await updateFirebaseInventory(balance, inventory);

                // Display stacked cards
                const stackContainer = document.getElementById("cardStackContainer");
                stackContainer.innerHTML = "";
                stackContainer.style.display = "block";
                stackContainer.style.pointerEvents = "auto";

                // Create the cards
                drawnCards.forEach((card, index) => {
                    const img = document.createElement("img");
                    img.src = card.image;
                    img.style.zIndex = `${100 - index}`; // Higher z-index = on top
                    img.style.transform = `translate(${index * 2}px, ${index * 2}px)`;
                    img.classList.add('card');  // Add a class for better control (optional)
                    stackContainer.appendChild(img);

                    // Add click event listener to each card
                    img.addEventListener("click", function handleClickCard(e) {
                        // Only trigger on top card
                        if (stackContainer.children.length === 0) return;

                        const topCard = stackContainer.querySelector("img:last-child");
                        if (e.target !== topCard) return; // Ensure only the top card is clickable

                        // Fade out and remove the top card
                        topCard.classList.add("fade-out");

                        setTimeout(() => {
                            topCard.remove();

                            // If no cards are left, disable the stack and reset states
                            if (stackContainer.children.length === 0) {
                                stackContainer.style.display = "none";
                                stackContainer.style.pointerEvents = "none";
                                isBuying = false;
                                buyTenCardsButton.disabled = balance < 1000;
                            }
                        }, 300); // Wait for fade-out animation
                    });
                });
            } else {
                alert("Not enough balance or a purchase is already in progress!");
            }
        }

        function updateBalance(newBalance) {
            balance = newBalance;
            localStorage.setItem('balance', balance);
            balanceDisplay.textContent = balance;
            updateFirebaseBalance(balance); // <-- Add this line
            checkBalance();
        }

        async function updateFirebaseBalance(newBalance) {
            const userData = JSON.parse(localStorage.getItem('twitchUser'));
            if (userData) {
                const userRef = doc(db, "users", userData.id);
                await updateDoc(userRef, {
                    balance: newBalance
                });
            }
        }

        function checkBalance() {
            addCardButton.disabled = balance < 100;
        }

        function showCardPopup(imageSrc) {
            const popup = document.getElementById("cardPopup");
            const popupImage = document.getElementById("popupImage");
            popupImage.src = imageSrc;
            popup.classList.add("show-popup");

            setTimeout(() => {
                popup.classList.remove("show-popup");
                addCardButton.disabled = balance < 100 ? true : false;
            }, 2000);
        }

        document.getElementById('addCardButton').addEventListener('click', addRandomCardToInventory);
        document.getElementById('buyTenCardsButton').addEventListener('click', buyTenCards);
        getCreditsButton.addEventListener('click', () => {
            const newBalance = balance + 100;
            updateBalance(newBalance);
            updateFirebaseBalance(newBalance);
        });
        checkBalance()


    </script>

    <script>
    // Function to check if user is logged in and update buttons
    function updateLoginState() {
        const loginBtn = document.getElementById("twitch-login");
        const logoutBtn = document.getElementById("logout-button");
        const twitchUser = JSON.parse(localStorage.getItem("twitchUser"));

        if (twitchUser) {
            // If user is logged in, hide login button and show logout button
            loginBtn.style.display = "none";
            logoutBtn.style.display = "inline-block";
        } else {
            // If user is not logged in, show login button and hide logout button
            loginBtn.style.display = "inline-block";
            logoutBtn.style.display = "none";
        }
    }

    // Call the function on page load to ensure correct button visibility
    window.addEventListener('DOMContentLoaded', () => {
        updateLoginState();
    });
</script>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        // Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyAW75d_4o7XdCsJ1_LmM_h4b2MxSJzrxfU",
            authDomain: "rillatcg-ab6ba.firebaseapp.com",
            projectId: "rillatcg-ab6ba",
            storageBucket: "rillatcg-ab6ba.appspot.com",
            messagingSenderId: "36231086933",
            appId: "1:36231086933:web:28450b8b754eff95f7a5dc"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);


        async function loadUserData() {
            const userData = JSON.parse(localStorage.getItem('twitchUser'));
            if (userData) {
                try {
                    const userRef = doc(db, "users", userData.id);
                    const userDoc = await getDoc(userRef);
                    if (userDoc.exists()) {
                        const user = userDoc.data();
                        localStorage.setItem('balance', user.balance);
                        document.getElementById('balance').textContent = user.balance;

                        // Load user's inventory
                        const inventory = user.inventory || [];
                        localStorage.setItem('inventory', JSON.stringify(inventory));

                        // Display cards based on inventory
                        displayCards();
                    } else {
                        console.log("User document not found in Firestore.");
                    }
                } catch (error) {
                    console.error("Error loading user data: ", error);
                }
            } else {
                console.log("No user data found in localStorage.");
            }
        }

        async function logOut() {
            // Clear user data from localStorage
            localStorage.removeItem('twitchUser');
            localStorage.removeItem('balance');
            localStorage.removeItem('inventory');
            document.getElementById('balance').textContent = "0"; // Reset balance on the UI

            // Optionally, update Firebase (e.g., track logout status)
            const userData = JSON.parse(localStorage.getItem('twitchUser'));
            if (userData) {
                const userRef = doc(db, "users", userData.id);
                // Only update the loggedIn status to false, not balance or inventory
                await updateDoc(userRef, {
                    loggedIn: false
                }).then(() => {
                    console.log("User logged out in Firestore.");
                }).catch((error) => {
                    console.error("Error updating user logout state in Firestore: ", error);
                });
            }

            // Hide the logout button and show login button
            //document.getElementById('logoutButton').style.display = 'none';
            //document.getElementById('loginButton').style.display = 'block';

            // Redirect to login page or home page if needed
            window.location.href = "index.html"; // Adjust as necessary
        }

        const userData = JSON.parse(localStorage.getItem("twitchUser"));
        if (userData) {
            const userRef = doc(db, "users", userData.id);
            const docSnap = await getDoc(userRef);
            if (!docSnap.exists()) {
                // Create a new user if no data exists for the user
                const newUser = {
                    id: userData.id,
                    displayName: userData.display_name,
                    profileImage: userData.profile_image_url,
                    inventory: [],
                    balance: 0,
                    createdAt: serverTimestamp()
                };
                await setDoc(userRef, newUser);
                console.log("New user created and data saved to Firestore!");
            } else {
                console.log("User data already exists in Firestore.");
                // No action needed since we don't want to reset existing user's data
            }
        }

        const loginBtn = document.getElementById("twitch-login");
        const logoutBtn = document.getElementById("logout-button");

        // Check if user is logged in
        const twitchUser = JSON.parse(localStorage.getItem("twitchUser"));

        if (twitchUser) {
            loginBtn.style.display = "none";
            logoutBtn.style.display = "inline-block";
        } else {
            loginBtn.style.display = "inline-block";
            logoutBtn.style.display = "none";
        }

        // Login button click -> Redirect to Twitch OAuth
        loginBtn.addEventListener("click", () => {
            window.location.href = "https://elk-hardy-previously.ngrok-free.app/auth/twitch";
        });

        logoutBtn.addEventListener("click", async () => {
            const userData = JSON.parse(localStorage.getItem("twitchUser"));
            if (userData) {
                // Clear localStorage
                localStorage.removeItem("twitchUser");
                localStorage.setItem("balance", 0);
                localStorage.setItem("inventory", JSON.stringify([]));

                console.log("Local storage cleared.");
            }

            // Hide the logout button and show the login button
            document.getElementById('logoutButton').style.display = 'none';
            document.getElementById('loginButton').style.display = 'block';

            // Redirect to the home page or login page
            window.location.href = "index.html"; // Adjust as necessary
        });

        const urlParams = new URLSearchParams(window.location.search);
        const userDataEncoded = urlParams.get("user");

        if (userDataEncoded) {
            try {
                const userData = JSON.parse(decodeURIComponent(userDataEncoded));
                localStorage.setItem("twitchUser", JSON.stringify(userData));
                console.log("Logged in as:", userData.display_name);

                const userRef = doc(db, "users", userData.id);
                const userSnap = await getDoc(userRef);

                if (userSnap.exists()) {
                    const user = userSnap.data();
                    localStorage.setItem("balance", user.balance);
                    localStorage.setItem("inventory", JSON.stringify(user.inventory || []));
                    console.log("Loaded user data from Firestore.");
                } else {
                    const newUser = {
                        id: userData.id,
                        displayName: userData.display_name,
                        profileImage: userData.profile_image_url,
                        inventory: [],
                        balance: 0,
                        createdAt: serverTimestamp()
                    };
                    await setDoc(userRef, newUser);
                    localStorage.setItem("balance", 0);
                    localStorage.setItem("inventory", JSON.stringify([]));
                    console.log("New user created.");
                }

                // Hide login, show logout
                document.getElementById("twitch-login").style.display = "none";
                document.getElementById("logout-button").style.display = "inline-block";

                // Clean up URL
                window.history.replaceState({}, document.title, window.location.pathname);
            } catch (err) {
                console.error("Failed to parse or store user:", err);
            }
        }
        document.getElementById("logout-button").addEventListener("click", async () => {
            const userData = JSON.parse(localStorage.getItem("twitchUser"));
            if (userData) {
                try {
                    const userRef = doc(db, "users", userData.id);
                    await updateDoc(userRef, {
                        loggedIn: false
                    });
                    console.log("User data reset in Firestore.");
                } catch (err) {
                    console.error("Error updating Firestore on logout:", err);
                }
            }
            // Clear local data
            localStorage.clear();
            window.location.href = "index.html";
        });
    </script>
